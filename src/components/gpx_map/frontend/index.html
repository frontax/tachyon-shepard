<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Streamlit GPX Map Component</title>
  <script src="./main.js"></script>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: "Helvetica Neue", sans-serif;
      color: #000000;
      background: transparent;
    }

    .container {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      height: auto;
    }

    #map {
      width: 100%;
      height: 400px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
      border: 1px solid #edf2f7;
    }

    .details-container {
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.05);
      overflow: hidden;
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    }
    .details-container:hover {
      box-shadow: 0 12px 40px 0 rgba(31, 38, 135, 0.1);
      background: rgba(255, 255, 255, 0.85);
    }

    .details-header {
      background: rgba(255, 255, 255, 0.4);
      padding: 15px 20px;
      font-weight: 800;
      font-size: 1.1em;
      border-bottom: 1px solid rgba(255, 255, 255, 0.5);
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #1a1a1a;
    }

    .table-wrapper {
      max-height: 350px;
      overflow-y: auto;
    }

    .table-wrapper::-webkit-scrollbar {
      width: 8px;
      height: 8px;
      background: transparent;
    }

    .table-wrapper::-webkit-scrollbar-thumb {
      background: transparent;
      border-radius: 4px;
    }

    .table-wrapper:hover::-webkit-scrollbar-thumb {
      background: rgba(0, 0, 0, 0.2);
    }

    .table-wrapper::-webkit-scrollbar-thumb:hover {
      background: rgba(0, 0, 0, 0.4);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      font-family: "Helvetica Neue", sans-serif;
      color: #000000;
    }

    tr {
      height: 25px;
    }

    td:nth-child(1) {
      text-align: left !important;
    }

    td:nth-child(2),
    td:nth-child(3),
    td:nth-child(4) {
      text-align: right !important;
    }

    th,
    td {
      padding: 0 16px;
      border: 1px solid rgba(0, 0, 0, 0.05);
      height: 25px;
      line-height: normal;
    }

    th {
      position: sticky;
      top: 0;
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(4px);
      color: #000000;
      font-weight: normal;
      text-align: center !important;
      border-bottom: 2px solid rgba(0, 0, 0, 0.05);
      height: 25px;
    }

    tbody tr {
      transition: background-color 0.1s;
      cursor: pointer;
    }

    tbody tr:hover {
      background-color: #e9ecef;
    }

    .delete-btn {
      background-color: transparent;
      border: none;
      color: #dc3545;
      cursor: pointer;
      padding: 4px;
      border-radius: 4px;
    }

    .delete-btn:hover {
      background-color: #ffeeba;
    }
  </style>
</head>

<body>
  <!-- Set up the Streamlit-Component communication -->
  <script>
    function sendMessageToStreamlitClient(type, data) {
      var outData = Object.assign({
        isStreamlitMessage: true,
        type: type,
      }, data);
      window.parent.postMessage(outData, "*");
    }

    function init() {
      sendMessageToStreamlitClient("streamlit:componentReady", { apiVersion: 1 });
    }

    function setFrameHeight(height) {
      sendMessageToStreamlitClient("streamlit:setFrameHeight", { height: height });
    }

    // The `data` argument can be any JSON-serializable value.
    function sendDataToPython(data) {
      sendMessageToStreamlitClient("streamlit:setComponentValue", data);
    }

    window.addEventListener("message", function (event) {
      if (event.data.type !== "streamlit:render") return;

      // Ensure Map is loaded, then render
      const args = event.data.args;
      if (!window.googleMapsLoaded) {
        const script = document.createElement("script");
        script.src = `https://maps.googleapis.com/maps/api/js?key=${args.api_key}&callback=onGoogleMapsLoaded`;
        script.async = true;
        script.defer = true;
        window.componentArgs = args; // Store for later
        document.head.appendChild(script);
      } else {
        renderComponent(args);
      }
    });

    window.onGoogleMapsLoaded = function () {
      window.googleMapsLoaded = true;
      renderComponent(window.componentArgs);
    }

    init();
  </script>

  <div class="container" id="app-root">
    <!-- Content injected by main.js -->
  </div>
</body>

</html>
